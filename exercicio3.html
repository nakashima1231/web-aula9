<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterando texto</title>
    <script>
        window.onload = inicio;

        let expressaoConta = '';

        function inicio() {
            let iguaL = document.getElementById('igual');
            iguaL.addEventListener('click', resultado);

            let limpar = document.getElementById('clear');
            limpar.addEventListener('click', limparExpressao);

            // contas
            let soma = document.getElementById('adicao');
            soma.addEventListener('click', montaExpressao);

            let menos = document.getElementById('subtracao');
            menos.addEventListener('click', montaExpressao);

            let dividir = document.getElementById('divisao');
            dividir.addEventListener('click', montaExpressao);

            let vezes = document.getElementById('multiplicacao');
            vezes.addEventListener('click', montaExpressao);

            // numeros
            let um = document.getElementById("um");
            um.addEventListener('click', montaExpressao);

            let dois = document.getElementById("dois");
            dois.addEventListener('click', montaExpressao);

            let tres = document.getElementById("tres");
            tres.addEventListener('click', montaExpressao);

            let quatro = document.getElementById("quatro");
            quatro.addEventListener('click', montaExpressao);

            let cinco = document.getElementById("cinco");
            cinco.addEventListener('click', montaExpressao);

            let seis = document.getElementById("seis");
            seis.addEventListener('click', montaExpressao);

            let sete = document.getElementById("sete");
            sete.addEventListener('click', montaExpressao);

            let oito = document.getElementById("oito");
            oito.addEventListener('click', montaExpressao);

            let nove = document.getElementById("nove");
            nove.addEventListener('click', montaExpressao);

            let zero = document.getElementById("zero");
            zero.addEventListener('click', montaExpressao);
        }

        function montaExpressao() {
            let ultimoComando = event.target.textContent;
            expressaoConta = expressaoConta + ultimoComando;
            let texto = document.getElementById('expressaoTexto');
            texto.innerHTML = expressaoConta;
        }

        function limparExpressao(){
            expressaoConta = '';
            let texto = document.getElementById('expressaoTexto');
            texto.innerHTML = expressaoConta;

            let conta = document.getElementById('resultado');
            conta.innerHTML = "";
        }

        function resultado() {
            let conta = document.getElementById('resultado');
            let resultadoConta = eval(expressaoConta);

            conta.innerHTML = resultadoConta;
        }


    </script>

    <style>
        body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .calculadora {
        border: 1px solid #000;
        padding: 20px;
        display: grid;
        grid-template-columns: repeat(4, 60px);
        gap: 10px;
    }

    button {
        height: 50px;
        font-size: 18px;
        cursor: pointer;
    }

    #expressaoTexto, #resultado {
        grid-column: span 4;
        border: 1px solid #000;
        height: 40px;
        text-align: right;
        padding: 5px;
    }

    button:hover {
        background-color: #ddd;
    }


    </style>
</head>

<body>
    <div class="calculadora">
        <p id="expressaoTexto"></p>
        <p id="resultado"></p>

        <button type="button" id="um">1</button>
        <button type="button" id="dois">2</button>
        <button type="button" id="tres">3</button>
        <button type="button" id="quatro">4</button>
        <button type="button" id="cinco">5</button>
        <button type="button" id="seis">6</button>
        <button type="button" id="sete">7</button>
        <button type="button" id="oito">8</button>
        <button type="button" id="nove">9</button>
        <button type="button" id="zero">0</button>

        <button type="button" id="adicao">+</button>
        <button type="button" id="subtracao">-</button>
        <button type="button" id="divisao">/</button>
        <button type="button" id="multiplicacao">*</button>
        <button type="button" id="clear">C</button>
        <button type="button" id="igual">=</button>
    </div>
    
</body>

</html>
